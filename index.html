<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Plan to PPTX — dnata</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:#fff;color:#1A1A1A;line-height:1.5}
.app-header{padding:1.5rem 2rem;border-bottom:3px solid #00A9CE}
.app-header h1{font-size:1.25rem;color:#3D3D3D;font-weight:700}
.app-header .brand{color:#00A9CE}
.app-header p{font-size:.8rem;color:#6B6B6B;margin-top:.25rem}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.upload-area{border:2px dashed #00A9CE;border-radius:8px;padding:3rem;text-align:center;cursor:pointer;transition:all .2s;background:#fff}
.upload-area:hover,.upload-area.dragover{background:#E6F6FA;border-color:#007A99}
.upload-area .icon{font-size:2.5rem;margin-bottom:.5rem}
.upload-area .label{font-size:1rem;color:#3D3D3D;font-weight:600}
.upload-area .hint{font-size:.8rem;color:#6B6B6B;margin-top:.25rem}
.upload-area input[type=file]{display:none}
.config{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin:1.5rem 0;padding:1rem;background:#F4F4F4;border-radius:6px}
.config label{font-size:.75rem;color:#6B6B6B;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.config input{display:block;width:100%;margin-top:.25rem;padding:.5rem;border:1px solid #D0D0D0;border-radius:4px;font-size:.875rem;color:#1A1A1A;font-family:inherit}
.config input:focus{outline:none;border-color:#00A9CE;box-shadow:0 0 0 2px rgba(0,169,206,.15)}
.task-table{width:100%;border-collapse:collapse;font-size:.8rem}
.task-table th{background:#007A99;color:#fff;padding:.5rem;text-align:left;font-weight:600}
.task-table td{padding:.4rem .5rem;border-bottom:1px solid #E0E0E0}
.task-table tr:nth-child(even){background:#F4F4F4}
.sb{display:inline-block;padding:.15rem .5rem;border-radius:3px;font-size:.7rem;font-weight:600}
.sb-d{background:#007A99;color:#fff}
.sb-p{background:#00A9CE;color:#fff}
.sb-n{background:#E6F6FA;color:#3D3D3D;border:1px solid #00A9CE}
.sb-b{background:#1A1A1A;color:#fff}
.preview-container{margin:1.5rem 0;overflow-x:auto}
.slide-frame{display:inline-block;box-shadow:0 2px 12px rgba(0,0,0,.12);border-radius:4px;overflow:hidden}
.slide{position:relative;width:1000px;height:563px;background:#fff;transform-origin:top left;overflow:hidden}
.slide *{position:absolute;box-sizing:border-box}
.actions{display:flex;gap:1rem;margin:1.5rem 0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border:none;border-radius:4px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-primary{background:#00A9CE;color:#fff}
.btn-primary:hover{background:#007A99}
.btn-secondary{background:#F4F4F4;color:#3D3D3D;border:1px solid #D0D0D0}
.btn-secondary:hover{background:#E0E0E0}
.hidden{display:none!important}
.error{background:#FFF0F0;color:#C00;padding:1rem;border-radius:6px;border-left:4px solid #C00;margin:1rem 0}
.section-title{font-size:.9rem;color:#3D3D3D;margin:1.5rem 0 .5rem}
.table-wrap{max-height:300px;overflow-y:auto;border:1px solid #E0E0E0;border-radius:4px}
.legend{display:flex;gap:1.5rem;flex-wrap:wrap;margin:.75rem 0;font-size:.75rem;color:#6B6B6B}
.legend-item{display:flex;align-items:center;gap:.35rem}
.legend-swatch{width:14px;height:10px;border-radius:2px;display:inline-block}
</style>
</head>
<body>
<header class="app-header">
  <h1><span class="brand">dnata</span> Delivery Plan Generator</h1>
  <p>Upload an Excel delivery plan to generate a branded PowerPoint Gantt chart</p>
</header>
<div class="container">
  <section id="upload-section">
    <div class="upload-area" id="drop-zone">
      <div class="icon">&#128202;</div>
      <div class="label">Drop your Excel file here or click to browse</div>
      <div class="hint">Accepts .xlsx files</div>
      <input type="file" id="file-input" accept=".xlsx,.xls">
    </div>
  </section>
  <div id="error-msg" class="error hidden"></div>
  <section id="result-section" class="hidden">
    <div class="config" id="config">
      <div><label>Title</label><input type="text" id="cfg-title"></div>
      <div><label>Start Sprint</label><input type="text" id="cfg-start-sprint" readonly></div>
      <div><label>Start Date</label><input type="date" id="cfg-start-date"></div>
      <div><label>Now Sprint</label><input type="text" id="cfg-now-sprint"></div>
    </div>
    <h3 class="section-title">Tasks (<span id="task-count">0</span>)</h3>
    <div class="table-wrap">
      <table class="task-table"><thead><tr>
        <th>Task</th><th>Status</th><th>Start</th><th>End</th><th>Milestone</th>
      </tr></thead><tbody id="task-tbody"></tbody></table>
    </div>
    <div class="legend" id="legend"></div>
    <h3 class="section-title">Slide Preview</h3>
    <div class="preview-container">
      <div class="slide-frame"><div class="slide" id="slide-preview"></div></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-download">Download PPTX</button>
      <button class="btn btn-secondary" id="btn-reset">Upload another file</button>
    </div>
  </section>
</div>
<script>
(function(){
'use strict';

var C = {
  teal:'00A9CE', tealDark:'007A99', tealTint:'E6F6FA',
  green:'5BB85D', charcoal:'1A1A1A', slate:'3D3D3D',
  midGrey:'6B6B6B', lightGrey:'F4F4F4', white:'FFFFFF'
};

var STATUS_FILL = {
  'Done':        {fill:C.tealDark},
  'In Progress': {fill:C.teal},
  'Not Started': {fill:C.tealTint, line:C.teal},
  'Blocked':     {fill:C.charcoal}
};
var DEFAULT_FILL = {fill:C.teal};

var SLIDE_W=13.333, SLIDE_H=7.5, PX=75;
var TITLE_X=0.5, TITLE_Y=0.35, TITLE_W=12, TITLE_H=0.55;
var MONTH_Y=1.07, MONTH_H=0.26;
var SPRINT_Y=1.33, SPRINT_H=0.30;
var ROWS_Y=1.63;
var ROW_BG_X=0.99;
var LABEL_X=1.04, LABEL_W=2.45;
var CHART_L=3.54, MARGIN_R=0.45;
var BAR_RADIUS=0.04;
var MIN_ROW_H=0.18, MAX_ROW_H=0.25;

function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function sprintDur(l){return l.split('.')[1]==='7'?7:14}

function parseDate(v){
  if(v instanceof Date && !isNaN(v)) return v;
  if(typeof v==='number') return new Date(Math.round((v-25569)*864e5));
  if(typeof v==='string'){var d=new Date(v);if(!isNaN(d))return d}
  return null;
}

function fmtMonth(d){
  return d.toLocaleDateString('en-GB',{month:'long'})+" '"+String(d.getFullYear()).slice(2);
}
function fmtSprintDate(d){
  var day=String(d.getDate()).padStart(2,'0');
  var mon=d.toLocaleDateString('en-GB',{month:'short'});
  return day+' '+mon;
}

function defaultStartDate(sp){
  if(!sp)return new Date();
  var m=sp.match(/Q(\d+)\.(\d+)/);
  if(!m)return new Date();
  var q=+m[1],s=+m[2],today=new Date();
  var fy=today.getMonth()<3?today.getFullYear()-1:today.getFullYear();
  var apr1=new Date(fy,3,1);
  var dow=apr1.getDay();
  var adj=[1,0,-1,-2,-3,3,2];
  apr1.setDate(apr1.getDate()+adj[dow]);
  return addDays(apr1,(q-1)*91+(s<=6?(s-1)*14:84));
}

// ===== PARSER =====
function parseExcel(buf){
  var wb=XLSX.read(buf,{type:'array',cellDates:true});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var ref=XLSX.utils.decode_range(ws['!ref']||'A1');

  function cv(r,c){
    var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
    if(!cell)return null;
    return cell.v!==undefined?cell.v:(cell.w||null);
  }

  var title=cv(0,0)||'Delivery Plan';
  var startSprint=null,startDate=null,nowSprint=null;

  for(var c=0;c<=ref.e.c;c++){
    var v=cv(0,c);
    if(typeof v==='string'){
      var vl=v.trim().toLowerCase();
      if(vl==='start:'){
        startSprint=cv(0,c+1);
        if(startSprint)startSprint=String(startSprint).trim();
        startDate=parseDate(cv(0,c+2));
      }
      if(vl==='now:'){
        var nv=cv(0,c+1);
        nowSprint=nv?String(nv).trim():null;
      }
    }
  }
  if(!startDate&&startSprint)startDate=defaultStartDate(startSprint);

  var hRow=-1;
  for(var r=0;r<=Math.min(10,ref.e.r);r++){
    var hv=cv(r,0);
    if(hv&&/task/i.test(String(hv))){hRow=r;break}
  }
  if(hRow<0)throw new Error('Header row not found. Column A must contain "Task".');

  var cols={},sprints=[];
  for(var c2=0;c2<=ref.e.c;c2++){
    var h=cv(hRow,c2);
    if(!h)continue;
    var hs=String(h).trim();
    if(/^Q\d+\.\d+$/.test(hs)){sprints.push(hs);continue}
    var sl=hs.toLowerCase();
    if(sl.indexOf('task')>=0&&cols.task===undefined)cols.task=c2;
    else if(sl==='status')cols.status=c2;
    else if(sl.indexOf('start')>=0&&sl.indexOf('sprint')>=0)cols.start=c2;
    else if((sl.indexOf('end')>=0||sl.indexOf('finish')>=0)&&sl.indexOf('sprint')>=0)cols.end=c2;
    else if(sl.indexOf('note')>=0)cols.notes=c2;
    else if(sl.indexOf('milestone')>=0&&cols.task!==c2)cols.milestone=c2;
  }

  var tasks=[];
  for(var r2=hRow+1;r2<=ref.e.r;r2++){
    var nm=cv(r2,cols.task);
    if(!nm||!String(nm).trim())continue;
    var st=cols.status!==undefined?(cv(r2,cols.status)||''):'';
    var ss=cols.start!==undefined?(cv(r2,cols.start)||''):'';
    var es=cols.end!==undefined?(cv(r2,cols.end)||''):'';
    var nt=cols.notes!==undefined?(cv(r2,cols.notes)||''):'';
    var mv=cols.milestone!==undefined?cv(r2,cols.milestone):null;
    var ml=mv?/^(y|yes|true|1|x)$/i.test(String(mv).trim()):false;
    tasks.push({name:String(nm).trim(),status:String(st).trim(),
      startSprint:String(ss).trim(),endSprint:String(es).trim(),
      notes:String(nt).trim(),milestone:ml});
  }
  if(!tasks.length)throw new Error('No tasks found.');
  if(!sprints.length)throw new Error('No sprint columns (Q#.#) found in header row.');

  return {title:title,startSprint:startSprint,startDate:startDate,
    nowSprint:nowSprint,sprints:sprints,tasks:tasks};
}

// ===== SPRINT DATES =====
function computeDates(sprints,startSprint,startDate){
  var dates={};
  var si=sprints.indexOf(startSprint);
  if(si<0||!startDate){
    var d=startDate||new Date();
    sprints.forEach(function(s){dates[s]=new Date(d);d=addDays(d,sprintDur(s))});
    return dates;
  }
  var d2=new Date(startDate);
  for(var i=si;i<sprints.length;i++){dates[sprints[i]]=new Date(d2);d2=addDays(d2,sprintDur(sprints[i]))}
  d2=new Date(startDate);
  for(var j=si-1;j>=0;j--){d2=addDays(d2,-sprintDur(sprints[j]));dates[sprints[j]]=new Date(d2)}
  return dates;
}

// ===== LAYOUT =====
function computeLayout(data){
  var tasks=data.tasks,sprints=data.sprints,nowSprint=data.nowSprint;
  var minI=Infinity,maxI=-1;
  tasks.forEach(function(t){
    var si=sprints.indexOf(t.startSprint),ei=sprints.indexOf(t.endSprint);
    if(si>=0&&si<minI)minI=si;
    if(ei>=0&&ei>maxI)maxI=ei;
  });
  if(minI>maxI){minI=0;maxI=Math.min(sprints.length-1,10)}

  var vis=sprints.slice(minI,maxI+1);
  var nS=vis.length, nT=tasks.length;
  var chartR=SLIDE_W-MARGIN_R;
  var chartW=chartR-CHART_L;
  var colW=chartW/nS;
  var availH=SLIDE_H-ROWS_Y-0.35;
  var rowH=Math.max(MIN_ROW_H,Math.min(MAX_ROW_H,availH/nT));
  var barH=rowH*0.6;

  var dates=computeDates(sprints,data.startSprint,data.startDate);

  // month headers
  var months=[],curMK=null;
  vis.forEach(function(s,i){
    var d=dates[s]; if(!d)return;
    var mk=d.getFullYear()*12+d.getMonth();
    if(mk!==curMK){
      if(months.length)months[months.length-1].w=CHART_L+i*colW-months[months.length-1].x;
      months.push({name:fmtMonth(d),x:CHART_L+i*colW,w:colW,
        color:months.length%2===0?C.tealDark:C.teal});
      curMK=mk;
    }
  });
  if(months.length)months[months.length-1].w=CHART_L+nS*colW-months[months.length-1].x;

  // sprint headers
  var sHdrs=vis.map(function(s,i){
    return {label:s,date:dates[s]?fmtSprintDate(dates[s]):'',
      x:CHART_L+i*colW,w:colW,bg:i%2===0?C.lightGrey:C.white};
  });

  // rows
  var mg=0.02;
  var rows=tasks.map(function(t,i){
    var si=vis.indexOf(t.startSprint),ei=vis.indexOf(t.endSprint);
    var has=si>=0&&ei>=0&&ei>=si;
    var fc=t.milestone?{fill:C.green}:(STATUS_FILL[t.status]||DEFAULT_FILL);
    return {task:t,y:ROWS_Y+i*rowH,bg:i%2===0?C.lightGrey:C.white,
      barX:has?CHART_L+si*colW+mg:null,
      barW:has?(ei-si+1)*colW-2*mg:0,
      barY:ROWS_Y+i*rowH+(rowH-barH)/2,barH:barH,barColor:fc};
  });

  // now line
  var nowLine=null;
  if(nowSprint){
    var ni=vis.indexOf(nowSprint);
    if(ni>=0)nowLine={x:CHART_L+ni*colW,y1:SPRINT_Y,y2:ROWS_Y+nT*rowH};
  }

  return {vis:vis,nS:nS,nT:nT,colW:colW,rowH:rowH,barH:barH,chartR:chartR,
    chart:{x:ROW_BG_X,y:ROWS_Y,w:chartR-ROW_BG_X,h:nT*rowH},
    months:months,sHdrs:sHdrs,rows:rows,nowLine:nowLine,dates:dates};
}

// ===== PREVIEW =====
function p(inches){return Math.round(inches*PX)}

function renderPreview(L,data){
  var el=document.getElementById('slide-preview');
  el.innerHTML='';

  function dv(x,y,w,h,bg,ex){
    var d=document.createElement('div');
    d.style.cssText='left:'+p(x)+'px;top:'+p(y)+'px;width:'+p(w)+'px;height:'+p(h)+'px;'
      +(bg?'background:#'+bg+';':'')+(ex||'');
    el.appendChild(d);return d;
  }
  function tx(x,y,w,h,text,st){
    var d=dv(x,y,w,h,null,'display:flex;align-items:center;'+(st||''));
    d.textContent=text;return d;
  }

  // title
  tx(TITLE_X,TITLE_Y,TITLE_W,TITLE_H,data.title,
    'font-size:'+p(0.28)+'px;font-weight:700;color:#'+C.slate+';');

  // row backgrounds
  L.rows.forEach(function(r){dv(L.chart.x,r.y,L.chart.w,L.rowH,r.bg)});

  // grid lines
  for(var i=0;i<=L.nS;i++){
    dv(CHART_L+i*L.colW,ROWS_Y,0,L.nT*L.rowH,null,'border-left:1px solid #E0E0E0;');
  }

  // month headers
  L.months.forEach(function(m){
    var d=dv(m.x,MONTH_Y,m.w,MONTH_H,m.color,
      'display:flex;align-items:center;justify-content:center;color:#fff;font-size:'
      +p(0.1)+'px;font-weight:700;');
    d.textContent=m.name;
  });

  // sprint headers
  L.sHdrs.forEach(function(s){
    dv(s.x,SPRINT_Y,s.w,SPRINT_H,s.bg);
    tx(s.x,SPRINT_Y,s.w,SPRINT_H*0.55,s.label,
      'justify-content:center;font-size:'+p(0.085)+'px;font-weight:700;color:#'+C.slate+';');
    tx(s.x,SPRINT_Y+SPRINT_H*0.5,s.w,SPRINT_H*0.5,s.date,
      'justify-content:center;font-size:'+p(0.06)+'px;color:#'+C.midGrey+';');
  });

  // task labels
  L.rows.forEach(function(r){
    tx(LABEL_X,r.y,LABEL_W,L.rowH,r.task.name,
      'font-size:'+p(0.09)+'px;color:#'+C.charcoal
      +';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;');
  });

  // gantt bars
  L.rows.forEach(function(r){
    if(r.barX===null||r.barW<=0)return;
    var bc=r.barColor;
    dv(r.barX,r.barY,r.barW,r.barH,bc.fill,
      'border-radius:'+p(BAR_RADIUS)+'px;'+(bc.line?'border:1px solid #'+bc.line+';':''));
  });

  // now line
  if(L.nowLine){
    var nl=L.nowLine;
    dv(nl.x,nl.y1,0,nl.y2-nl.y1,null,
      'border-left:2px dashed #'+C.charcoal+';z-index:5;');
    tx(nl.x-0.15,nl.y2+0.01,0.3,0.12,'Now',
      'justify-content:center;font-size:'+p(0.065)+'px;color:#'+C.charcoal+';font-style:italic;z-index:5;');
  }

  // chart border
  dv(L.chart.x,L.chart.y,L.chart.w,L.chart.h,null,'border:1px solid #D0D0D0;pointer-events:none;');

  scalePreview();
}

function scalePreview(){
  var sl=document.getElementById('slide-preview');
  var ct=sl.closest('.preview-container');
  if(!ct)return;
  var cw=ct.clientWidth;
  var sc=Math.min(1,(cw-10)/1000);
  sl.style.transform='scale('+sc+')';
  sl.parentElement.style.width=1000*sc+'px';
  sl.parentElement.style.height=563*sc+'px';
}

// ===== PPTX GENERATOR =====
function generatePPTX(L,data){
  var pptx=new PptxGenJS();
  pptx.defineLayout({name:'DNATA',width:SLIDE_W,height:SLIDE_H});
  pptx.layout='DNATA';
  var slide=pptx.addSlide();

  // title
  slide.addText(data.title,{
    x:TITLE_X,y:TITLE_Y,w:TITLE_W,h:TITLE_H,
    fontSize:32,fontFace:'Arial',color:C.slate,bold:true,valign:'middle'
  });

  // row backgrounds
  L.rows.forEach(function(r){
    slide.addShape(pptx.shapes.RECTANGLE,{
      x:L.chart.x,y:r.y,w:L.chart.w,h:L.rowH,
      fill:{color:r.bg}
    });
  });

  // grid lines
  for(var i=0;i<=L.nS;i++){
    slide.addShape(pptx.shapes.LINE,{
      x:CHART_L+i*L.colW,y:ROWS_Y,w:0,h:L.nT*L.rowH,
      line:{color:'E0E0E0',width:0.5}
    });
  }

  // month headers
  L.months.forEach(function(m){
    slide.addShape(pptx.shapes.RECTANGLE,{
      x:m.x,y:MONTH_Y,w:m.w,h:MONTH_H,
      fill:{color:m.color}
    });
    slide.addText(m.name,{
      x:m.x,y:MONTH_Y,w:m.w,h:MONTH_H,
      fontSize:10,fontFace:'Arial',color:C.white,
      bold:true,align:'center',valign:'middle'
    });
  });

  // month dividers in sprint header
  L.months.forEach(function(m,i){
    if(i>0){
      slide.addShape(pptx.shapes.LINE,{
        x:m.x,y:SPRINT_Y,w:0,h:SPRINT_H,
        line:{color:'C0C0C0',width:0.5}
      });
    }
  });

  // sprint headers
  L.sHdrs.forEach(function(s){
    slide.addShape(pptx.shapes.RECTANGLE,{
      x:s.x,y:SPRINT_Y,w:s.w,h:SPRINT_H,
      fill:{color:s.bg}
    });
    slide.addText(s.label,{
      x:s.x,y:SPRINT_Y+0.01,w:s.w,h:SPRINT_H*0.52,
      fontSize:8.5,fontFace:'Arial',color:C.slate,
      bold:true,align:'center',valign:'middle'
    });
    slide.addText(s.date,{
      x:s.x,y:SPRINT_Y+SPRINT_H*0.5,w:s.w,h:SPRINT_H*0.5,
      fontSize:6.5,fontFace:'Arial',color:C.midGrey,
      align:'center',valign:'middle'
    });
  });

  // task labels
  L.rows.forEach(function(r){
    slide.addText(r.task.name,{
      x:LABEL_X,y:r.y,w:LABEL_W,h:L.rowH,
      fontSize:9,fontFace:'Arial',color:C.charcoal,valign:'middle',
      autoFit:true
    });
  });

  // gantt bars
  L.rows.forEach(function(r){
    if(r.barX===null||r.barW<=0)return;
    var opts={
      x:r.barX,y:r.barY,w:r.barW,h:r.barH,
      fill:{color:r.barColor.fill},rectRadius:BAR_RADIUS
    };
    if(r.barColor.line){
      opts.line={color:r.barColor.line,width:0.75};
    }
    slide.addShape(pptx.shapes.ROUNDED_RECTANGLE,opts);
  });

  // now line
  if(L.nowLine){
    var nl=L.nowLine;
    slide.addShape(pptx.shapes.LINE,{
      x:nl.x,y:nl.y1,w:0,h:nl.y2-nl.y1,
      line:{color:C.charcoal,width:1.5,dashType:'lgDash'}
    });
    slide.addText('Now',{
      x:nl.x-0.2,y:nl.y2+0.02,w:0.4,h:0.15,
      fontSize:7,fontFace:'Arial',color:C.charcoal,
      italic:true,align:'center',valign:'top'
    });
  }

  // chart border
  slide.addShape(pptx.shapes.RECTANGLE,{
    x:L.chart.x,y:L.chart.y,w:L.chart.w,h:L.chart.h,
    fill:{type:'none'},line:{color:'D0D0D0',width:0.75}
  });

  // status legend at bottom
  var legendY=ROWS_Y+L.nT*L.rowH+0.3;
  if(legendY+0.2<SLIDE_H){
    var legendItems=[
      {label:'Done',color:C.tealDark},
      {label:'In Progress',color:C.teal},
      {label:'Not Started',color:C.tealTint,border:C.teal},
      {label:'Blocked',color:C.charcoal},
      {label:'Milestone',color:C.green}
    ];
    var lx=CHART_L;
    legendItems.forEach(function(li){
      slide.addShape(pptx.shapes.ROUNDED_RECTANGLE,{
        x:lx,y:legendY,w:0.18,h:0.12,
        fill:{color:li.color},rectRadius:0.02,
        line:li.border?{color:li.border,width:0.5}:undefined
      });
      slide.addText(li.label,{
        x:lx+0.22,y:legendY-0.01,w:0.9,h:0.14,
        fontSize:6.5,fontFace:'Arial',color:C.midGrey,valign:'middle'
      });
      lx+=1.1;
    });
  }

  var fn=data.title.replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s+/g,'_')+'.pptx';
  pptx.writeFile({fileName:fn}).catch(function(e){showError('PPTX error: '+e.message)});
}

// ===== UI =====
var currentData=null, currentLayout=null;

function showError(msg){
  var el=document.getElementById('error-msg');
  el.textContent=msg;el.classList.remove('hidden');
}
function clearError(){document.getElementById('error-msg').classList.add('hidden')}

function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function statusBadge(s){
  var cls={Done:'sb-d','In Progress':'sb-p','Not Started':'sb-n',Blocked:'sb-b'}[s]||'';
  return '<span class="sb '+cls+'">'+escH(s)+'</span>';
}

function buildLegend(){
  var el=document.getElementById('legend');
  var items=[
    {label:'Done',color:'#007A99'},
    {label:'In Progress',color:'#00A9CE'},
    {label:'Not Started',color:'#E6F6FA',border:'#00A9CE'},
    {label:'Blocked',color:'#1A1A1A'},
    {label:'Milestone',color:'#5BB85D'}
  ];
  el.innerHTML=items.map(function(it){
    var bdr=it.border?'border:1px solid '+it.border:'';
    return '<div class="legend-item"><span class="legend-swatch" style="background:'+it.color+';'+bdr+'"></span>'+it.label+'</div>';
  }).join('');
}

function updateUI(){
  if(!currentData)return;
  currentData.title=document.getElementById('cfg-title').value||currentData.title;
  var di=document.getElementById('cfg-start-date').value;
  if(di){var pts=di.split('-');currentData.startDate=new Date(+pts[0],+pts[1]-1,+pts[2])}
  currentData.nowSprint=document.getElementById('cfg-now-sprint').value.trim()||null;
  try{currentLayout=computeLayout(currentData);renderPreview(currentLayout,currentData)}
  catch(e){showError('Layout error: '+e.message)}
}

function handleFile(file){
  clearError();
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      currentData=parseExcel(new Uint8Array(e.target.result));
      document.getElementById('cfg-title').value=currentData.title;
      document.getElementById('cfg-start-sprint').value=currentData.startSprint||'';
      if(currentData.startDate){
        var d=currentData.startDate;
        document.getElementById('cfg-start-date').value=
          d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      document.getElementById('cfg-now-sprint').value=currentData.nowSprint||'';
      document.getElementById('task-count').textContent=currentData.tasks.length;
      var tb=document.getElementById('task-tbody');
      tb.innerHTML='';
      currentData.tasks.forEach(function(t){
        var tr=document.createElement('tr');
        tr.innerHTML='<td>'+escH(t.name)+'</td><td>'+statusBadge(t.status)+'</td><td>'
          +escH(t.startSprint)+'</td><td>'+escH(t.endSprint)+'</td><td>'+(t.milestone?'&#10003;':'')+'</td>';
        tb.appendChild(tr);
      });
      buildLegend();
      document.getElementById('upload-section').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
      updateUI();
    }catch(err){showError(err.message)}
  };
  reader.readAsArrayBuffer(file);
}

function init(){
  var dz=document.getElementById('drop-zone');
  var fi=document.getElementById('file-input');
  dz.addEventListener('click',function(){fi.click()});
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dragover');
    if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change',function(){if(fi.files.length)handleFile(fi.files[0])});
  ['cfg-title','cfg-start-date','cfg-now-sprint'].forEach(function(id){
    document.getElementById(id).addEventListener('change',updateUI);
  });
  document.getElementById('btn-download').addEventListener('click',function(){
    if(currentLayout&&currentData)generatePPTX(currentLayout,currentData);
  });
  document.getElementById('btn-reset').addEventListener('click',function(){
    currentData=null;currentLayout=null;
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('upload-section').classList.remove('hidden');
    fi.value='';clearError();
  });
  window.addEventListener('resize',scalePreview);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
