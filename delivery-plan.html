<style>
:root{
  --teal:#00A9CE; --teal-dark:#007A99; --teal-tint:#E6F6FA;
  --charcoal:#1A1A1A; --slate:#3D3D3D; --mid:#6B6B6B;
  --ink:#172B4D; --line:#E4E8EB; --line-soft:#EEF1F3;
  --bg:#F6F8F9; --card:#FFFFFF;
  --radius:12px; --shadow:0 1px 3px rgba(23,43,77,.06),0 1px 2px rgba(23,43,77,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--charcoal);line-height:1.5;-webkit-font-smoothing:antialiased}

/* Header */
.app-header{background:var(--card);border-bottom:1px solid var(--line);padding:1.1rem 0}
.app-header .inner{max-width:1120px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;gap:.9rem}
.brand-logo{height:34px;width:auto;display:block}
.logo-div{width:1px;height:30px;background:var(--line)}
.app-header h1{font-size:1.02rem;color:var(--slate);font-weight:700;letter-spacing:-.01em}
.app-header p{font-size:.78rem;color:var(--mid);margin-top:.1rem}

.container{max-width:1120px;margin:0 auto;padding:1.5rem 2rem 1rem}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:1.1rem 1.4rem;margin-bottom:1rem}
.card-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;margin-bottom:1rem}
.card-head .title{font-size:.72rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em}
.card-head .sub{font-size:.74rem;color:var(--mid);font-weight:500;text-transform:none;letter-spacing:0;margin-left:.5rem}

/* Upload */
.upload-card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:1.1rem}
.upload-area{border:2px dashed #CBD5DC;border-radius:12px;padding:1.75rem 2rem;text-align:center;cursor:pointer;
  transition:border-color .18s,background .18s;background:#FCFDFE}
.upload-area:hover,.upload-area.dragover{background:var(--teal-tint);border-color:var(--teal)}
.upload-icon{width:46px;height:46px;border-radius:12px;background:var(--teal-tint);
  display:flex;align-items:center;justify-content:center;margin:0 auto .7rem}
.upload-icon svg{width:22px;height:22px;stroke:var(--teal)}
.upload-title{font-size:1.05rem;color:var(--charcoal);font-weight:700;letter-spacing:-.01em}
.upload-sub{font-size:.83rem;color:var(--mid);margin-top:.3rem}
.upload-sub .link{color:var(--teal);font-weight:600;cursor:pointer}
.upload-area input[type=file]{display:none}
.upload-foot{display:flex;justify-content:flex-end;margin-top:.85rem}

/* Config grid */
.config{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1.1rem}
.field label{font-size:.68rem;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.field input{display:block;width:100%;margin-top:.35rem;padding:.55rem .7rem;border:1px solid var(--line);
  border-radius:8px;font-size:.9rem;color:var(--charcoal);font-family:inherit;background:#fff;transition:border-color .15s,box-shadow .15s}
.field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,169,206,.14)}
.field input[readonly]{background:#F4F6F7;color:var(--mid);cursor:default}

/* Sprint range */
.range-row{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
.range-row .lbl{font-size:.85rem;font-weight:600;color:var(--slate)}
.range-row .to{font-size:.82rem;color:var(--mid)}
.sel{position:relative;display:inline-flex}
.sel select{appearance:none;-webkit-appearance:none;font-family:inherit;font-size:.88rem;font-weight:600;color:var(--charcoal);
  background:#fff;border:1px solid var(--line);border-radius:8px;padding:.5rem 2rem .5rem .75rem;cursor:pointer;
  transition:border-color .15s,box-shadow .15s}
.sel select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,169,206,.14)}
.sel::after{content:"";position:absolute;right:.7rem;top:50%;width:8px;height:8px;border-right:2px solid var(--mid);
  border-bottom:2px solid var(--mid);transform:translateY(-70%) rotate(45deg);pointer-events:none}
.link-btn{background:none;border:none;color:var(--teal);font-weight:600;font-size:.85rem;cursor:pointer;font-family:inherit;padding:.3rem .2rem}
.link-btn:hover{color:var(--teal-dark);text-decoration:underline}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.3rem;border:none;border-radius:9px;
  font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .18s,border-color .18s,color .18s}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark)}
.btn-secondary{background:#fff;color:var(--slate);border:1px solid var(--line)}
.btn-secondary:hover{background:#F4F6F7;border-color:#D4DBE0}
.btn-ghost{background:#fff;color:var(--slate);border:1px solid var(--line)}
.btn-ghost:hover{background:#F4F6F7;border-color:var(--teal);color:var(--teal-dark)}
.btn-ghost svg{stroke:currentColor}
.mini-btn{padding:.32rem .7rem;font-size:.75rem;border:1px solid var(--line);background:#fff;border-radius:7px;
  cursor:pointer;color:var(--slate);font-family:inherit;font-weight:600}
.mini-btn:hover{background:#F4F6F7;border-color:var(--teal);color:var(--teal-dark)}
.controls-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}

/* Segmented control */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#F4F6F7;padding:2px}
.seg button{padding:.42rem .9rem;border:none;background:transparent;color:var(--mid);font-weight:600;cursor:pointer;
  font-size:.8rem;font-family:inherit;border-radius:7px;transition:all .15s}
.seg button.active{background:#fff;color:var(--teal-dark);box-shadow:0 1px 2px rgba(23,43,77,.1)}

/* Tasks table */
.table-wrap{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:10px}
.task-table{width:100%;border-collapse:collapse;font-size:.82rem}
.task-table thead th{position:sticky;top:0;background:#F4F6F7;color:var(--slate);padding:.6rem .7rem;text-align:left;
  font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);z-index:1}
.task-table th.cbcol,.task-table td.cbcol{width:40px;text-align:center;padding-left:0;padding-right:0}
.task-table td{padding:.5rem .7rem;border-bottom:1px solid var(--line-soft);color:var(--charcoal)}
.task-table tbody tr:last-child td{border-bottom:none}
.task-table tbody tr:hover{background:#FAFBFC}
.task-table tbody tr.off td:not(.cbcol){opacity:.45;text-decoration:line-through}
.task-table tbody tr.offplan td:not(.cbcol){color:#97A0AF}
.task-table input[type=checkbox]{accent-color:var(--teal);width:16px;height:16px;cursor:pointer}
.tag-offplan{display:inline-block;margin-left:.45rem;font-size:.6rem;font-weight:700;color:#97A0AF;border:1px solid #D3D9DE;
  border-radius:4px;padding:.05rem .35rem;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em}
.tag-nodate{display:inline-block;margin-left:.45rem;font-size:.6rem;font-weight:700;color:#B25E00;border:1px solid #F0C48A;
  border-radius:4px;padding:.05rem .35rem;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em}
.sb{display:inline-block;padding:.16rem .55rem;border-radius:5px;font-size:.7rem;font-weight:600}
.sb-d{background:#36B37E;color:#fff}
.sb-p{background:#2684FF;color:#fff}
.sb-n{background:#F1F3F5;color:#42526E;border:1px solid #C6CDD3}
.sb-b{background:#DE350B;color:#fff}
.sb-m{background:#F59E0B;color:#fff}

/* Legend */
.legend{display:flex;gap:1.4rem;flex-wrap:wrap;font-size:.78rem;color:var(--mid)}
.legend-item{display:flex;align-items:center;gap:.4rem}
.legend-swatch{width:16px;height:11px;border-radius:3px;display:inline-block}

/* Preview */
.preview-container{overflow-x:auto;border-radius:10px}
.slide-frame{display:inline-block;box-shadow:0 4px 20px rgba(23,43,77,.12);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.slide{position:relative;width:1000px;height:563px;background:#fff;transform-origin:top left;overflow:hidden}
.slide *{position:absolute;box-sizing:border-box}

.actions{display:flex;gap:.9rem;flex-wrap:wrap}
.hidden{display:none!important}
.error{background:#FFF4F2;color:#B42318;padding:.9rem 1.1rem;border-radius:10px;border:1px solid #FDD;border-left:4px solid #DE350B;margin-bottom:1.25rem;font-size:.85rem}
.hint-note{margin-bottom:1rem;font-size:.82rem;color:#42526E;background:#F4F6F7;border-left:3px solid #A5ADBA;padding:.6rem .85rem;border-radius:0 8px 8px 0}
.note-block{margin-bottom:.55rem}
.note-block:last-child{margin-bottom:0}
.note-lead{font-weight:600}
.note-list{margin:.25rem 0 .15rem 1.15rem;padding:0}
.note-list li{font-size:.8rem;margin:.05rem 0}
.hint-note .link-btn{font-size:.78rem;padding:.1rem 0}
.section-label{font-size:.72rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.app-footer{max-width:1120px;margin:.5rem auto 2rem;padding:0 2rem;text-align:center;font-size:.78rem;color:var(--mid)}
</style>
</head>

function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function sprintDur(l){return l.split('.')[1]==='7'?7:14}

function parseDate(v){
  if(v instanceof Date && !isNaN(v)) return v;
  if(typeof v==='number') return new Date(Math.round((v-25569)*864e5));
  if(typeof v==='string'){var d=new Date(v);if(!isNaN(d))return d}
  return null;
}
function toInput(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fromInput(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}

function fmtMonth(d){
  return d.toLocaleDateString('en-GB',{month:'long'})+" '"+String(d.getFullYear()).slice(2);
}
function fmtSprintDate(d){
  var day=String(d.getDate()).padStart(2,'0');
  var mon=d.toLocaleDateString('en-GB',{month:'short'});
  return day+' '+mon;
}

function defaultStartDate(sp){
  if(!sp)return new Date();
  var m=sp.match(/Q(\d+)\.(\d+)/);
  if(!m)return new Date();
  var q=+m[1],s=+m[2],today=new Date();
  var fy=today.getMonth()<3?today.getFullYear()-1:today.getFullYear();
  var apr1=new Date(fy,3,1);
  var dow=apr1.getDay();
  var adj=[1,0,-1,-2,-3,3,2];
  apr1.setDate(apr1.getDate()+adj[dow]);
  return addDays(apr1,(q-1)*91+(s<=6?(s-1)*14:84));
}

// ===== PARSER =====
function parseExcel(buf){
  var wb=XLSX.read(buf,{type:'array',cellDates:true});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var ref=XLSX.utils.decode_range(ws['!ref']||'A1');

  function cv(r,c){
    var cell=ws[XLSX.utils.encode_cell({r:r,c:c})];
    if(!cell)return null;
    return cell.v!==undefined?cell.v:(cell.w||null);
  }

  var title=cv(0,0)||'Delivery Plan';
  var startSprint=null,startDate=null,nowSprint=null;

  for(var c=0;c<=ref.e.c;c++){
    var v=cv(0,c);
    if(typeof v==='string'){
      var vl=v.trim().toLowerCase();
      if(vl==='start:'){
        startSprint=cv(0,c+1);
        if(startSprint)startSprint=String(startSprint).trim();
        startDate=parseDate(cv(0,c+2));
      }
      if(vl==='now:'){
        var nv=cv(0,c+1);
        nowSprint=nv?String(nv).trim():null;
      }
    }
  }
  if(!startDate&&startSprint)startDate=defaultStartDate(startSprint);

  var hRow=-1;
  for(var r=0;r<=Math.min(10,ref.e.r);r++){
    var hv=cv(r,0);
    if(hv&&/task/i.test(String(hv))){hRow=r;break}
  }
  if(hRow<0)throw new Error('Header row not found. Column A must contain "Task".');

  var cols={},sprints=[];
  for(var c2=0;c2<=ref.e.c;c2++){
    var h=cv(hRow,c2);
    if(!h)continue;
    var hs=String(h).trim();
    if(/^Q\d+\.\d+$/.test(hs)){sprints.push(hs);continue}
    var sl=hs.toLowerCase();
    if(sl.indexOf('task')>=0&&cols.task===undefined)cols.task=c2;
    else if(sl==='status')cols.status=c2;
    else if(sl.indexOf('start')>=0&&sl.indexOf('sprint')>=0)cols.start=c2;
    else if((sl.indexOf('end')>=0||sl.indexOf('finish')>=0)&&sl.indexOf('sprint')>=0)cols.end=c2;
    else if(sl.indexOf('note')>=0)cols.notes=c2;
    else if(sl.indexOf('milestone')>=0&&cols.task!==c2)cols.milestone=c2;
    else if(sl.indexOf('category')>=0||sl.indexOf('section')>=0)cols.section=c2;
  }

  var tasks=[];
  for(var r2=hRow+1;r2<=ref.e.r;r2++){
    var nm=cv(r2,cols.task);
    if(!nm||!String(nm).trim())continue;
    var st=cols.status!==undefined?(cv(r2,cols.status)||''):'';
    var ss=cols.start!==undefined?(cv(r2,cols.start)||''):'';
    var es=cols.end!==undefined?(cv(r2,cols.end)||''):'';
    var nt=cols.notes!==undefined?(cv(r2,cols.notes)||''):'';
    var mv=cols.milestone!==undefined?cv(r2,cols.milestone):null;
    var sc=cols.section!==undefined?(cv(r2,cols.section)||''):'';
    var stStr=String(st).trim();
    // Milestone flag: a dedicated column OR a Status of "Milestone".
    var ml=(mv?/^(y|yes|true|1|x)$/i.test(String(mv).trim()):false)||/^milestone$/i.test(stStr);
    tasks.push({name:String(nm).trim(),status:stStr,
      startSprint:String(ss).trim(),endSprint:String(es).trim(),
      notes:String(nt).trim(),milestone:ml,section:String(sc).trim(),selected:true});
  }
  if(!tasks.length)throw new Error('No tasks found.');
  if(!sprints.length)throw new Error('No sprint columns (Q#.#) found in header row.');

  return {title:title,startSprint:startSprint,startDate:startDate,
    nowSprint:nowSprint,sprints:sprints,tasks:tasks,
    selectedSprints:null,nowDate:null,colorMode:'status'};
}

// ===== SPRINT DATES =====
function computeDates(sprints,startSprint,startDate){
  var dates={};
  var si=sprints.indexOf(startSprint);
  if(si<0||!startDate){
    var d=startDate||new Date();
    sprints.forEach(function(s){dates[s]=new Date(d);d=addDays(d,sprintDur(s))});
    return dates;
  }
  var d2=new Date(startDate);
  for(var i=si;i<sprints.length;i++){dates[sprints[i]]=new Date(d2);d2=addDays(d2,sprintDur(sprints[i]))}
  d2=new Date(startDate);
  for(var j=si-1;j>=0;j--){d2=addDays(d2,-sprintDur(sprints[j]));dates[sprints[j]]=new Date(d2)}
  return dates;
}

// auto sprint range from task start/end
function autoSprintRange(data){
  var sprints=data.sprints,tasks=data.tasks;
  var minI=Infinity,maxI=-1;
  tasks.forEach(function(t){
    var si=sprints.indexOf(t.startSprint),ei=sprints.indexOf(t.endSprint);
    if(si>=0&&si<minI)minI=si;
    if(ei>=0&&ei>maxI)maxI=ei;
  });
  if(minI>maxI){minI=0;maxI=Math.min(sprints.length-1,10)}
  return sprints.slice(minI,maxI+1);
}

function barColorFor(t,mode){
  if(t.milestone)return MILESTONE_FILL;
  if(mode==='single')return SINGLE_FILL;
  return STATUS_FILL[t.status]||DEFAULT_FILL;
}

// ===== LAYOUT =====
function computeLayout(data){
  var sprints=data.sprints;
  var selSet=data.selectedSprints||{};
  var vis=sprints.filter(function(s){return selSet[s]});
  if(!vis.length)vis=autoSprintRange(data);
  var tasks=data.tasks.filter(function(t){return t.selected!==false});

  var nS=vis.length;
  var chartR=SLIDE_W-MARGIN_R;
  var chartW=chartR-CHART_L;
  var colW=chartW/nS;

  var dates=computeDates(sprints,data.startSprint,data.startDate);
  var visGlobal=vis.map(function(s){return sprints.indexOf(s)});

  // Resolve each selected task's bar span within the visible sprints.
  // Tasks that fall entirely outside the selected window have no bar and
  // are auto-hidden from the plan (kept in `hidden` for a graceful note).
  var placed=[],hidden=[],undated=[];
  tasks.forEach(function(t){
    var gs=sprints.indexOf(t.startSprint),ge=sprints.indexOf(t.endSprint);
    var valid=gs>=0&&ge>=0&&ge>=gs;
    var firstPos=-1,lastPos=-1;
    if(valid){
      for(var k=0;k<vis.length;k++){
        var g=visGlobal[k];
        if(g>=gs&&g<=ge){if(firstPos<0)firstPos=k;lastPos=k}
      }
    }
    if(firstPos>=0)placed.push({task:t,firstPos:firstPos,lastPos:lastPos});
    else if(valid)hidden.push(t);   // valid dates, outside visible range
    else undated.push(t);           // missing/invalid start or end sprint
  });

  // group placed tasks by section (first-appearance order; unsectioned last)
  var sectioned=placed.some(function(o){return o.task.section});
  var order=null;
  if(sectioned){
    var gmap=Object.create(null); order=[];
    placed.forEach(function(o){
      var key=o.task.section||'';
      if(!(key in gmap)){gmap[key]={name:key,items:[]};order.push(gmap[key])}
      gmap[key].items.push(o);
    });
    order.sort(function(a,b){return (a.name===''?1:0)-(b.name===''?1:0)});
    placed=[];
    order.forEach(function(g){g.items.forEach(function(o){placed.push(o)})});
  }

  var nT=placed.length;
  var availH=SLIDE_H-ROWS_Y-0.35;
  var rowH=nT?Math.max(MIN_ROW_H,Math.min(MAX_ROW_H,availH/nT)):MAX_ROW_H;
  var barH=rowH*0.6;

  // section sidebar bands (left gutter), only for named sections
  var bands=[],dividers=[];
  if(sectioned){
    var idx2=0,ci=0;
    order.forEach(function(g,gi){
      if(gi>0)dividers.push(ROWS_Y+idx2*rowH);      // grey line between swimlanes
      if(g.name){bands.push({name:g.name,y:ROWS_Y+idx2*rowH,h:g.items.length*rowH,
        color:SECTION_COLORS[ci%SECTION_COLORS.length]});ci++}
      idx2+=g.items.length;
    });
  }

  // month headers aligned to real calendar days (month boundaries placed
  // proportionally within the sprint columns, like the Today line)
  function dateToX(dt){
    for(var mi=0;mi<vis.length;mi++){
      var sd=dates[vis[mi]]; if(!sd)continue;
      var dur=sprintDur(vis[mi]),end=addDays(sd,dur);
      if(dt<sd)return CHART_L+mi*colW;
      if(dt<end)return CHART_L+(mi+(dt-sd)/(dur*864e5))*colW;
    }
    return CHART_L+vis.length*colW;
  }
  var months=[];
  var mSpanStart=dates[vis[0]];
  var mLast=vis[vis.length-1], mSpanEnd=dates[mLast]?addDays(dates[mLast],sprintDur(mLast)):null;
  if(mSpanStart&&mSpanEnd){
    var mCur=new Date(mSpanStart.getFullYear(),mSpanStart.getMonth(),1),mIdx=0;
    while(mCur<mSpanEnd){
      var mNext=new Date(mCur.getFullYear(),mCur.getMonth()+1,1);
      var segS=mCur<mSpanStart?mSpanStart:mCur, segE=mNext>mSpanEnd?mSpanEnd:mNext;
      var mx0=dateToX(segS),mw=dateToX(segE)-mx0;
      var mFull=fmtMonth(mCur);
      var mShort=mCur.toLocaleDateString('en-GB',{month:'short'})+" '"+String(mCur.getFullYear()).slice(2);
      var mLabel=mw>=mFull.length*0.072?mFull:(mw>=mShort.length*0.072?mShort:'');
      months.push({name:mLabel,x:mx0,w:mw,color:mIdx%2===0?C.tealDark:C.teal});
      mIdx++; mCur=mNext;
    }
  }

  // sprint headers
  var sHdrs=vis.map(function(s,i){
    return {label:s,date:dates[s]?fmtSprintDate(dates[s]):'',
      x:CHART_L+i*colW,w:colW,bg:i%2===0?C.lightGrey:C.white};
  });

  // rows (only tasks with a bar in the visible window)
  var mg=0.02;
  var rows=placed.map(function(o,i){
    var t=o.task;
    var fc=barColorFor(t,data.colorMode);
    return {task:t,y:ROWS_Y+i*rowH,bg:i%2===0?C.lightGrey:C.white,
      barX:CHART_L+o.firstPos*colW+mg,
      barW:(o.lastPos-o.firstPos+1)*colW-2*mg,
      barY:ROWS_Y+i*rowH+(rowH-barH)/2,barH:barH,barColor:fc};
  });

  // proportional now line
  var nowLine=null;
  var nowDate=data.nowDate;
  if(nowDate&&vis.length){
    var x=null;
    for(var m=0;m<vis.length;m++){
      var sd=dates[vis[m]]; if(!sd)continue;
      var dur=sprintDur(vis[m]); var end=addDays(sd,dur);
      if(nowDate<sd){x=CHART_L+m*colW;break}
      if(nowDate>=sd&&nowDate<end){var frac=(nowDate-sd)/(dur*864e5);x=CHART_L+(m+frac)*colW;break}
      if(m===vis.length-1)x=CHART_L+vis.length*colW;
    }
    if(x!==null)nowLine={x:x,y1:SPRINT_Y,y2:ROWS_Y+nT*rowH};
  }

  return {vis:vis,nS:nS,nT:nT,colW:colW,rowH:rowH,barH:barH,chartR:chartR,
    chart:{x:ROW_BG_X,y:ROWS_Y,w:chartR-ROW_BG_X,h:nT*rowH},
    months:months,sHdrs:sHdrs,rows:rows,nowLine:nowLine,dates:dates,
    bands:bands,dividers:dividers,hidden:hidden,undated:undated,colorMode:data.colorMode};
}

// ===== PREVIEW =====
function p(inches){return Math.round(inches*PX)}

function renderPreview(L,data){
  var el=document.getElementById('slide-preview');
  el.innerHTML='';

  function dv(x,y,w,h,bg,ex){
    var d=document.createElement('div');
    d.style.cssText='left:'+p(x)+'px;top:'+p(y)+'px;width:'+p(w)+'px;height:'+p(h)+'px;'
      +(bg?'background:#'+bg+';':'')+(ex||'');
    el.appendChild(d);return d;
  }
  function tx(x,y,w,h,text,st){
    var d=dv(x,y,w,h,null,'display:flex;align-items:center;'+(st||''));
    d.textContent=text;return d;
  }

  tx(TITLE_X,TITLE_Y,TITLE_W,TITLE_H,data.title,
    'font-size:'+p(0.28)+'px;font-weight:700;color:#'+C.slate+';');

  L.rows.forEach(function(r){dv(L.chart.x,r.y,L.chart.w,L.rowH,r.bg)});

  // section sidebars
  (L.bands||[]).forEach(function(b){
    var band=dv(SEC_X,b.y,SEC_W,b.h,b.color,'border-radius:'+p(0.03)+'px;overflow:hidden;');
    var sp=document.createElement('span');
    sp.textContent=b.name;
    var fs=Math.min(0.1,Math.max(0.068,b.h/4));
    sp.style.cssText='left:50%;top:50%;width:'+p(Math.max(0.2,b.h-0.06))+'px;'
      +'transform:translate(-50%,-50%) rotate(-90deg);white-space:normal;text-align:center;'
      +'line-height:1.05;color:#fff;font-size:'+p(fs)+'px;font-weight:700;';
    band.appendChild(sp);
  });

  // thin grey dividers between swimlanes
  (L.dividers||[]).forEach(function(y){
    dv(SEC_X,y,L.chartR-SEC_X,0,null,'border-top:1px solid #C0C0C0;z-index:4;');
  });

  for(var i=0;i<=L.nS;i++){
    dv(CHART_L+i*L.colW,ROWS_Y,0,L.nT*L.rowH,null,'border-left:1px solid #E0E0E0;');
  }

  L.months.forEach(function(m){
    var d=dv(m.x,MONTH_Y,m.w,MONTH_H,m.color,
      'display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;font-size:'
      +p(0.1)+'px;font-weight:700;');
    d.textContent=m.name;
  });

  L.sHdrs.forEach(function(s){
    dv(s.x,SPRINT_Y,s.w,SPRINT_H,s.bg);
    tx(s.x,SPRINT_Y,s.w,SPRINT_H*0.55,s.label,
      'justify-content:center;font-size:'+p(0.085)+'px;font-weight:700;color:#'+C.slate+';');
    tx(s.x,SPRINT_Y+SPRINT_H*0.5,s.w,SPRINT_H*0.5,s.date,
      'justify-content:center;font-size:'+p(0.06)+'px;color:#'+C.midGrey+';');
  });

  L.rows.forEach(function(r){
    tx(LABEL_X,r.y,LABEL_W,L.rowH,r.task.name,
      'font-size:'+p(0.09)+'px;color:#'+C.charcoal
      +';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;');
  });

  L.rows.forEach(function(r){
    if(r.barX===null||r.barW<=0)return;
    var bc=r.barColor;
    dv(r.barX,r.barY,r.barW,r.barH,bc.fill,
      'border-radius:'+p(BAR_RADIUS)+'px;'+(bc.line?'border:1px solid #'+bc.line+';':''));
  });

  if(L.nowLine){
    var nl=L.nowLine;
    dv(nl.x,nl.y1,0,nl.y2-nl.y1,null,
      'border-left:2px solid #'+C.green+';z-index:5;');
    tx(nl.x-0.18,nl.y2+0.01,0.36,0.12,'Today',
      'justify-content:center;font-size:'+p(0.065)+'px;color:#'+C.green+';font-style:italic;z-index:5;');
  }

  dv(L.chart.x,L.chart.y,L.chart.w,L.chart.h,null,'border:1px solid #D0D0D0;pointer-events:none;');

  scalePreview();
}

function scalePreview(){
  var sl=document.getElementById('slide-preview');
  var ct=sl.closest('.preview-container');
  if(!ct)return;
  var cw=ct.clientWidth;
  var sc=Math.min(1,(cw-2)/1000);
  sl.style.transform='scale('+sc+')';
  sl.parentElement.style.width=1000*sc+'px';
  sl.parentElement.style.height=563*sc+'px';
}

// ===== PPTX GENERATOR =====
function generatePPTX(L,data){
  var pptx=new PptxGenJS();
  pptx.defineLayout({name:'DNATA',width:SLIDE_W,height:SLIDE_H});
  pptx.layout='DNATA';
  var slide=pptx.addSlide();

  slide.addText(data.title,{
    x:TITLE_X,y:TITLE_Y,w:TITLE_W,h:TITLE_H,
    fontSize:32,fontFace:'Arial',color:C.slate,bold:true,valign:'middle'
  });

  L.rows.forEach(function(r){
    slide.addShape(pptx.shapes.RECTANGLE,{
      x:L.chart.x,y:r.y,w:L.chart.w,h:L.rowH,fill:{color:r.bg}
    });
  });

  (L.bands||[]).forEach(function(b){
    slide.addShape(pptx.shapes.ROUNDED_RECTANGLE,{x:SEC_X,y:b.y,w:SEC_W,h:b.h,fill:{color:b.color},rectRadius:0.03});
    var cx=SEC_X+SEC_W/2, cy=b.y+b.h/2, bw=b.h, bh=SEC_W;
    slide.addText(b.name,{x:cx-bw/2,y:cy-bh/2,w:bw,h:bh,rotate:270,
      fontSize:9,fontFace:'Arial',color:'FFFFFF',bold:true,align:'center',valign:'middle'});
  });

  (L.dividers||[]).forEach(function(y){
    slide.addShape(pptx.shapes.LINE,{x:SEC_X,y:y,w:L.chartR-SEC_X,h:0,line:{color:'C0C0C0',width:0.75}});
  });

  for(var i=0;i<=L.nS;i++){
    slide.addShape(pptx.shapes.LINE,{
      x:CHART_L+i*L.colW,y:ROWS_Y,w:0,h:L.nT*L.rowH,
      line:{color:'E0E0E0',width:0.5}
    });
  }

  L.months.forEach(function(m){
    slide.addShape(pptx.shapes.RECTANGLE,{x:m.x,y:MONTH_Y,w:m.w,h:MONTH_H,fill:{color:m.color}});
    if(m.name)slide.addText(m.name,{
      x:m.x,y:MONTH_Y,w:m.w,h:MONTH_H,
      fontSize:10,fontFace:'Arial',color:C.white,bold:true,align:'center',valign:'middle'
    });
  });

  L.months.forEach(function(m,i){
    if(i>0){
      slide.addShape(pptx.shapes.LINE,{x:m.x,y:SPRINT_Y,w:0,h:SPRINT_H,line:{color:'C0C0C0',width:0.5}});
    }
  });

  L.sHdrs.forEach(function(s){
    slide.addShape(pptx.shapes.RECTANGLE,{x:s.x,y:SPRINT_Y,w:s.w,h:SPRINT_H,fill:{color:s.bg}});
    slide.addText(s.label,{
      x:s.x,y:SPRINT_Y+0.01,w:s.w,h:SPRINT_H*0.52,
      fontSize:8.5,fontFace:'Arial',color:C.slate,bold:true,align:'center',valign:'middle'
    });
    slide.addText(s.date,{
      x:s.x,y:SPRINT_Y+SPRINT_H*0.5,w:s.w,h:SPRINT_H*0.5,
      fontSize:6.5,fontFace:'Arial',color:C.midGrey,align:'center',valign:'middle'
    });
  });

  L.rows.forEach(function(r){
    slide.addText(r.task.name,{
      x:LABEL_X,y:r.y,w:LABEL_W,h:L.rowH,
      fontSize:9,fontFace:'Arial',color:C.charcoal,valign:'middle',autoFit:true
    });
  });

  L.rows.forEach(function(r){
    if(r.barX===null||r.barW<=0)return;
    var opts={x:r.barX,y:r.barY,w:r.barW,h:r.barH,fill:{color:r.barColor.fill},rectRadius:BAR_RADIUS};
    if(r.barColor.line)opts.line={color:r.barColor.line,width:0.75};
    slide.addShape(pptx.shapes.ROUNDED_RECTANGLE,opts);
  });

  if(L.nowLine){
    var nl=L.nowLine;
    slide.addShape(pptx.shapes.LINE,{
      x:nl.x,y:nl.y1,w:0,h:nl.y2-nl.y1,
      line:{color:C.green,width:1.5}
    });
    slide.addText('Today',{
      x:nl.x-0.25,y:nl.y2+0.02,w:0.5,h:0.15,
      fontSize:7,fontFace:'Arial',color:C.green,italic:true,align:'center',valign:'top'
    });
  }

  slide.addShape(pptx.shapes.RECTANGLE,{
    x:L.chart.x,y:L.chart.y,w:L.chart.w,h:L.chart.h,
    fill:{type:'none'},line:{color:'D0D0D0',width:0.75}
  });

  var legendY=ROWS_Y+L.nT*L.rowH+0.3;
  if(legendY+0.2<SLIDE_H){
    var legendItems=legendFor(L.colorMode);
    var lx=CHART_L;
    legendItems.forEach(function(li){
      slide.addShape(pptx.shapes.ROUNDED_RECTANGLE,{
        x:lx,y:legendY,w:0.18,h:0.12,fill:{color:li.color},rectRadius:0.02,
        line:li.border?{color:li.border,width:0.5}:undefined
      });
      slide.addText(li.label,{
        x:lx+0.22,y:legendY-0.01,w:0.9,h:0.14,
        fontSize:6.5,fontFace:'Arial',color:C.midGrey,valign:'middle'
      });
      lx+=1.1;
    });
  }

  var fn=(data.title.replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s+/g,'_').replace(/^_+|_+$/g,'')||'Delivery_Plan')+'.pptx';
  pptx.writeFile({fileName:fn}).catch(function(e){showError('PPTX error: '+e.message)});
}

// ===== LEGEND =====
function legendFor(mode){
  if(mode==='single'){
    return [
      {label:'Scheduled',color:C.teal},
      {label:'Milestone',color:S.amber}
    ];
  }
  return [
    {label:'Done',color:S.green},
    {label:'In Progress',color:S.blue},
    {label:'Not Started',color:S.grey,border:S.greyLine},
    {label:'Blocked',color:S.red},
    {label:'Milestone',color:S.amber}
  ];
}

// ===== UI =====
var currentData=null, currentLayout=null;

function showError(msg){
  var el=document.getElementById('error-msg');
  el.textContent=msg;el.classList.remove('hidden');
}
function clearError(){document.getElementById('error-msg').classList.add('hidden')}

function escH(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function statusBadge(s){
  var M={Done:'sb-d','In Progress':'sb-p','Not Started':'sb-n',Blocked:'sb-b',Milestone:'sb-m'};
  var cls=Object.prototype.hasOwnProperty.call(M,s)?M[s]:'';
  return s?'<span class="sb '+cls+'">'+escH(s)+'</span>':'';
}

function buildLegend(){
  var el=document.getElementById('legend');
  var items=legendFor(currentData?currentData.colorMode:'status');
  el.innerHTML=items.map(function(it){
    var bdr=it.border?'border:1px solid #'+it.border:'';
    return '<div class="legend-item"><span class="legend-swatch" style="background:#'+it.color+';'+bdr+'"></span>'+it.label+'</div>';
  }).join('');
}

// ---- Sprint range (From / To) ----
function populateSprintSelects(){
  var from=document.getElementById('spr-from'), to=document.getElementById('spr-to');
  var dates=computeDates(currentData.sprints,currentData.startSprint,currentData.startDate);
  var html=currentData.sprints.map(function(s){
    var d=dates[s]?'  ·  '+fmtSprintDate(dates[s]):'';
    return '<option value="'+s+'">'+s+d+'</option>';
  }).join('');
  from.innerHTML=html; to.innerHTML=html;
  var auto=autoSprintRange(currentData);
  from.value=auto[0]; to.value=auto[auto.length-1];
  applySprintRange();
}

function applySprintRange(){
  var fromEl=document.getElementById('spr-from'), toEl=document.getElementById('spr-to');
  var fi=currentData.sprints.indexOf(fromEl.value), ti=currentData.sprints.indexOf(toEl.value);
  if(fi<0||ti<0)return;
  if(ti<fi){var tmp=fi;fi=ti;ti=tmp;fromEl.value=currentData.sprints[fi];toEl.value=currentData.sprints[ti]}
  currentData.selectedSprints={};
  for(var i=fi;i<=ti;i++)currentData.selectedSprints[currentData.sprints[i]]=true;
  document.getElementById('sprint-count-lbl').textContent=(ti-fi+1)+' of '+currentData.sprints.length+' sprints';
  updateUI();
}

function resetSprintRange(){
  var auto=autoSprintRange(currentData);
  document.getElementById('spr-from').value=auto[0];
  document.getElementById('spr-to').value=auto[auto.length-1];
  applySprintRange();
}

function buildTaskTable(){
  var tb=document.getElementById('task-tbody');
  tb.innerHTML='';
  currentData.tasks.forEach(function(t,idx){
    var tr=document.createElement('tr');
    tr.setAttribute('data-i',idx);
    if(t.selected===false)tr.className='off';
    tr.innerHTML='<td class="cbcol"><input type="checkbox" data-i="'+idx+'"'+(t.selected!==false?' checked':'')+'></td>'
      +'<td>'+escH(t.name)+'</td><td>'+escH(t.section||'')+'</td><td>'+statusBadge(t.status)+'</td><td>'
      +escH(t.startSprint)+'</td><td>'+escH(t.endSprint)+'</td><td>'+(t.milestone?'&#10003;':'')+'</td>';
    tb.appendChild(tr);
  });
  tb.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var i=+cb.getAttribute('data-i');
      currentData.tasks[i].selected=cb.checked;
      cb.closest('tr').classList.toggle('off',!cb.checked);
      updateTaskCount();updateUI();
    });
  });
  updateTaskCount();
}

function updateTaskCount(){
  var n=currentData.tasks.filter(function(t){return t.selected!==false}).length;
  document.getElementById('task-sel-lbl').textContent='('+n+' of '+currentData.tasks.length+' shown)';
  var head=document.getElementById('task-head-cb');
  head.checked=n===currentData.tasks.length;
  head.indeterminate=n>0&&n<currentData.tasks.length;
}

function updateUI(){
  if(!currentData)return;
  currentData.title=document.getElementById('cfg-title').value||currentData.title;
  var di=document.getElementById('cfg-start-date').value;
  if(di)currentData.startDate=fromInput(di);
  var nd=document.getElementById('cfg-now-date').value;
  currentData.nowDate=nd?fromInput(nd):null;
  try{
    currentLayout=computeLayout(currentData);
    renderPreview(currentLayout,currentData);
    renderHiddenNote(currentLayout.hidden,currentLayout.undated);
    clearError();
  }
  catch(e){showError('Layout error: '+e.message)}
}

// Reflect auto-hidden tasks (selected but outside the chosen sprints):
// tag their table rows and show a graceful summary above the preview.
function renderHiddenNote(hidden,undated){
  hidden=hidden||[]; undated=undated||[];
  var hset={},uset={};
  hidden.forEach(function(t){hset[currentData.tasks.indexOf(t)]=true});
  undated.forEach(function(t){uset[currentData.tasks.indexOf(t)]=true});
  document.querySelectorAll('#task-tbody tr').forEach(function(tr){
    var i=+tr.getAttribute('data-i');
    var name=tr.children[1];
    function tag(cls,txt,on){
      var ex=name.querySelector('.'+cls);
      if(on&&!ex){var s=document.createElement('span');s.className=cls;s.textContent=txt;name.appendChild(s)}
      else if(!on&&ex)ex.remove();
    }
    tr.classList.toggle('offplan',!!hset[i]||!!uset[i]);
    tag('tag-offplan','off-plan',!!hset[i]);
    tag('tag-nodate','no dates',!!uset[i]);
  });
  var note=document.getElementById('hidden-note');
  note.innerHTML='';
  function block(items,lead){
    if(!items.length)return;
    var wrap=document.createElement('div'); wrap.className='note-block';
    var ld=document.createElement('div'); ld.className='note-lead'; ld.textContent=lead; wrap.appendChild(ld);
    var ul=document.createElement('ul'); ul.className='note-list';
    items.forEach(function(t,idx){
      var li=document.createElement('li'); li.textContent=t.name;
      if(idx>=5)li.className='extra hidden';
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
    if(items.length>5){
      var extra=items.length-5;
      var btn=document.createElement('button'); btn.className='link-btn'; btn.textContent='See '+extra+' more';
      btn.addEventListener('click',function(){
        var showing=ul.querySelectorAll('li.extra.hidden').length===0;
        ul.querySelectorAll('li.extra').forEach(function(li){li.classList.toggle('hidden',showing)});
        btn.textContent=showing?('See '+extra+' more'):'See less';
      });
      wrap.appendChild(btn);
    }
    note.appendChild(wrap);
  }
  block(hidden,hidden.length+' task'+(hidden.length>1?'s':'')+' outside the selected sprints \u2014 widen the range to include:');
  block(undated,undated.length+' task'+(undated.length>1?'s':'')+' with no start/end sprint \u2014 can\u2019t be placed:');
  note.classList.toggle('hidden', !hidden.length && !undated.length);
}

function defaultNowDate(data){
  var today=new Date();today.setHours(0,0,0,0);
  var vis=autoSprintRange(data);
  var dates=computeDates(data.sprints,data.startSprint,data.startDate);
  var first=dates[vis[0]], lastS=vis[vis.length-1];
  var last=dates[lastS]?addDays(dates[lastS],sprintDur(lastS)):null;
  if(first&&last&&today>=first&&today<last)return today;
  if(data.nowSprint&&dates[data.nowSprint])return dates[data.nowSprint];
  return today;
}

function handleFile(file){
  clearError();
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      currentData=parseExcel(new Uint8Array(e.target.result));
      currentData.selectedSprints={};
      autoSprintRange(currentData).forEach(function(s){currentData.selectedSprints[s]=true});
      currentData.nowDate=defaultNowDate(currentData);

      document.getElementById('cfg-title').value=currentData.title;
      document.getElementById('cfg-start-sprint').value=currentData.startSprint||'';
      if(currentData.startDate)document.getElementById('cfg-start-date').value=toInput(currentData.startDate);
      document.getElementById('cfg-now-date').value=currentData.nowDate?toInput(currentData.nowDate):'';

      setColorSeg(currentData.colorMode);
      populateSprintSelects();
      buildTaskTable();
      buildLegend();

      document.getElementById('upload-section').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
      updateUI();
    }catch(err){showError(err.message)}
  };
  reader.readAsArrayBuffer(file);
}

function setColorSeg(mode){
  document.querySelectorAll('#color-seg button').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-mode')===mode);
  });
}

function setAllTasks(on){
  currentData.tasks.forEach(function(t){t.selected=on});
  buildTaskTable();updateUI();
}

// ---- Blank template download ----
function downloadTemplate(){
  try{
    var bin=atob(TEMPLATE_B64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    var blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='Delivery_Plan_Template.xlsx';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(url)},1500);
  }catch(e){showError('Template download failed: '+e.message)}
}

function init(){
  var dz=document.getElementById('drop-zone');
  var fi=document.getElementById('file-input');
  dz.addEventListener('click',function(){fi.click()});
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover')});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover')});
  dz.addEventListener('drop',function(e){
    e.preventDefault();dz.classList.remove('dragover');
    if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change',function(){if(fi.files.length)handleFile(fi.files[0])});

  document.getElementById('btn-template').addEventListener('click',function(e){e.stopPropagation();downloadTemplate()});

  ['cfg-title','cfg-start-date','cfg-now-date'].forEach(function(id){
    document.getElementById(id).addEventListener('change',updateUI);
    document.getElementById(id).addEventListener('input',updateUI);
  });

  document.getElementById('spr-from').addEventListener('change',applySprintRange);
  document.getElementById('spr-to').addEventListener('change',applySprintRange);
  document.getElementById('spr-reset').addEventListener('click',resetSprintRange);

  document.getElementById('task-all').addEventListener('click',function(){setAllTasks(true)});
  document.getElementById('task-none').addEventListener('click',function(){setAllTasks(false)});
  document.getElementById('task-head-cb').addEventListener('change',function(e){setAllTasks(e.target.checked)});

  document.querySelectorAll('#color-seg button').forEach(function(b){
    b.addEventListener('click',function(){
      currentData.colorMode=b.getAttribute('data-mode');
      setColorSeg(currentData.colorMode);
      buildLegend();updateUI();
    });
  });

  document.getElementById('btn-download').addEventListener('click',function(){
    if(currentLayout&&currentData){
      if(!currentLayout.nT){showError('No tasks fall within the selected sprints. Adjust the sprint range or task selection to include at least one task.');return}
      generatePPTX(currentLayout,currentData);
    }
  });
  document.getElementById('btn-reset').addEventListener('click',function(){
    currentData=null;currentLayout=null;
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('upload-section').classList.remove('hidden');
    fi.value='';clearError();
  });
  window.addEventListener('resize',scalePreview);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
